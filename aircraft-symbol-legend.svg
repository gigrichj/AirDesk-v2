<svg xmlns="http://www.w3.org/2000/svg" width="920" height="260" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">Big Plane Radar Aircraft Symbol Legend</title>
  <desc id="desc">Legend showing small, normal, and large aircraft triangles plus the rotorcraft symbol with a tail.</desc>
  <rect width="920" height="260" fill="#020807"/>
  <style>
    .title { fill: #ebffee; font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { fill: #ebffee; font: 700 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .meta { fill: #6ebe91; font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .panel { fill: #061411; stroke: #082e21; stroke-width: 2; }
    .symbol { fill: #ff3750; stroke: #ff3750; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <text x="32" y="38" class="title">Aircraft Symbol Legend</text>

  <g transform="translate(32 70)">
    <rect class="panel" x="0" y="0" width="200" height="155" rx="8"/>
    <g transform="translate(100 60)">
      <polygon class="symbol" points="0,-9 5,6 -5,6"/>
    </g>
    <text x="24" y="112" class="label">Small aircraft</text>
    <text x="24" y="136" class="meta">A1, A2, B*</text>
  </g>

  <g transform="translate(254 70)">
    <rect class="panel" x="0" y="0" width="200" height="155" rx="8"/>
    <g transform="translate(100 60)">
      <polygon class="symbol" points="0,-12 6,8 -6,8"/>
    </g>
    <text x="24" y="112" class="label">Normal aircraft</text>
    <text x="24" y="136" class="meta">A3, A6, unknown</text>
  </g>

  <g transform="translate(476 70)">
    <rect class="panel" x="0" y="0" width="200" height="155" rx="8"/>
    <g transform="translate(100 60)">
      <polygon class="symbol" points="0,-15 8,10 -8,10"/>
    </g>
    <text x="24" y="112" class="label">Large aircraft</text>
    <text x="24" y="136" class="meta">A4, A5</text>
  </g>

  <g transform="translate(698 70)">
    <rect class="panel" x="0" y="0" width="190" height="155" rx="8"/>
    <g transform="translate(95 60)" stroke-width="2">
      <line class="symbol" x1="-3" y1="-3" x2="3" y2="3"/>
      <line class="symbol" x1="-3" y1="3" x2="3" y2="-3"/>
      <line class="symbol" x1="0" y1="0" x2="0" y2="7"/>
    </g>
    <text x="24" y="112" class="label">Helicopter</text>
    <text x="24" y="136" class="meta">A7, tail shows heading</text>
  </g>
</svg>
